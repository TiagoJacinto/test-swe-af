name: Dispatch labeled issues

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch ready issues
        run: |
          curl -X POST ${{ secrets.AGENTFIELD_URL }}/webhooks/github/issues/dispatcher \
            -H "Content-Type: application/json" \
            -d '{"repo": "${{ github.repository }}", "label": "ready-for-agent"}'
